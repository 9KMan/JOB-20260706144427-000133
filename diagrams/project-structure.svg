<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 680" fill="#ffffff" xml:space="preserve" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12">
  <text x="240" y="24" font-size="14" font-weight="bold" fill="#111111">Grux PoC File Structure</text>

  <text x="40" y="50" fill="#111111">.</text>
