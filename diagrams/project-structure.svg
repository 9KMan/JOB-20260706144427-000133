  <text x="40" y="306" fill="#111111">│</text>
  <text x="40" y="322" fill="#111111">├── mobile/                          # Flutter app</text>
  <text x="40" y="338" fill="#111111">│   ├── pubspec.yaml                 # Dependencies (http, provider)</text>
  <text x="40" y="354" fill="#111111">│   ├── analysis_options.yaml        # Lints config</text>
