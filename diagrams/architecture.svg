  <ellipse cx="950" cy="438.0" rx="90.0" ry="22.0" fill="#FFFFFF" stroke="#13315C" stroke-width="1.2"/>

  <text x="950" y="510" class="node-name" text-anchor="middle">GCP Cloud SQL Postgres</text>
