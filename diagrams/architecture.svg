    </style>
    <pattern id="dotgrid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.7" fill="#E5E9F0" opacity="0.55"/>
    </pattern>
    <linearGradient id="edgeGlow" x1="0%" y1="0%" x2="100%" y2="0%">
