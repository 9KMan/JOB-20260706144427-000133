  <rect x="40" y="550" width="1020" height="36" rx="4" fill="#F4F7FB" stroke="#8DA9C4" stroke-width="0.6"/>
  <text x="56" y="572" class="footnote">PoC uses in-memory store for portability &#183; Production path swaps to Cloud SQL Postgres via the same ItemStore interface (no handler changes) &#183; All paths traced via X-Request-Id</text>
