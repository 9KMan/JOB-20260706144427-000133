<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 600" width="1100" height="600">
  <defs>
    <style>
      .title     { font: 700 18px 'Inter', 'Helvetica Neue', sans-serif; fill: #0B2545; letter-spacing: 0.4px; }
      .subtitle  { font: 11px 'Inter', sans-serif; fill: #13315C; opacity: 0.7; }
      .node-name { font: 600 13px 'Inter', sans-serif; fill: #0B2545; }
      .node-sub  { font: 10px 'Inter', sans-serif; fill: #13315C; opacity: 0.75; }
      .edge-lbl  { font: 500 10px 'Inter', sans-serif; fill: #1B9AAA; }
